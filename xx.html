<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>XX 정보 - 실시간 정보 대시보드</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --secondary-text: #666;
      --card-bg: #f8f9fa;
      --border-color: #e5e5e5;
    }

    [data-theme="dark"] {
      --bg-color: #1a1a1a;
      --text-color: #e0e0e0;
      --secondary-text: #aaa;
      --card-bg: #242424;
      --border-color: #3a3a3a;
    }

    body { 
      margin: 0; 
      font-family: Arial, sans-serif; 
      padding: 20px;
      box-sizing: border-box;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    h1 { 
      margin-top: 0;
      color: var(--text-color);
    }

    .content-section {
      margin-top: 30px;
      padding: 20px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
    }

    .content-section h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .cert-list {
      margin: 0;
      padding-left: 20px;
      color: var(--secondary-text);
    }

    .cert-list li {
      margin-bottom: 10px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>XX 정보</h1>
  
  <div class="content-section">
    <h2>금융관련 (for fun)</h2>
    <ul class="cert-list">
      <li>국내외 레버리지 ETP Guide 수강</li>
    </ul>
  </div>
  
  <script src="js/theme-manager.js"></script>
  <script>
    let themeManager;
    window.addEventListener('load', function() {
      themeManager = createThemeManager({ isMainPage: false });

      themeManager.onThemeChange((theme) => {
        console.log('XX 페이지 테마 변경:', theme);
      });
    });
  </script>
</body>
</html>
